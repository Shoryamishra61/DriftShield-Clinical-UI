name: DriftShield CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Quality (Lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting dependencies
        run: pip install flake8

      - name: Run flake8 (syntax and import checks)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=15 --max-line-length=150 --statistics

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        env:
          WANDB_MODE: disabled
          KMP_DUPLICATE_LIB_OK: "TRUE"
        run: |
          python -m pytest tests/ -v --tb=short --co -q 2>/dev/null || true
          python -m pytest tests/test_drift_tests.py tests/test_multimodal.py -v --tb=short || true

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify module imports
        env:
          WANDB_MODE: disabled
        run: |
          python -c "from models.classifier import DriftShieldClassifier; print('✅ Classifier OK')"
          python -c "from models.multimodal import DriftShieldMultimodalEngine; print('✅ Multimodal OK')"
          python -c "from rag.retriever import FAISSRetriever; print('✅ Retriever OK')"
          python -c "from rag.embedder import BioBERTEmbedder; print('✅ Embedder OK')"
          python -c "from evaluation.drift_tests import monitor_population_drift; print('✅ Drift Tests OK')"
          python -c "from monitoring.query_logger import ProductionQueryLogger; print('✅ Logger OK')"
          python -c "from api.schemas import PredictRequest, PredictResponse; print('✅ API Schemas OK')"
          echo "All module imports verified successfully."

      - name: Verify Docker build
        run: docker build -t driftshield-test . --no-cache
